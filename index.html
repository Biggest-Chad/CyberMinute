<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Minute</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Subtle Matrix-style digital rain background -->
    <canvas id="matrix-bg"></canvas>

    <div class="app-container">

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="start-content">
                <img src="https://www.skywavetechnologies.com/wp-content/uploads/2015/12/swt-logo.png" alt="Skywave Technologies" class="logo">
                
                <h1>Cyber Minute <span class="v2-badge">v2</span></h1>
                <p class="tagline">Test your cybersecurity knowledge — Modernized</p>

                <div class="mode-buttons">
                    <button id="start-button" class="btn btn-primary">Start 60-Second Challenge</button>
                    <button id="study-button" class="btn btn-secondary">Study Mode</button>
                </div>

                <div class="high-score-box">
                    <span>High Score</span>
                    <span id="high-score-display" class="high-score-value">0</span>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="timer">
                    <span id="timer">60</span>
                    <span class="timer-label">seconds</span>
                </div>
                <div class="score">
                    <span id="score">0</span>
                </div>
                <button id="menu-button" class="btn btn-menu">Menu</button>
            </div>

            <!-- Countdown -->
            <div id="countdown" class="countdown hidden">
                <div class="countdown-number"></div>
            </div>

            <div class="question-container">
                <div id="question" class="question"></div>
            </div>

            <div class="answer-section">
                <div class="answer-buttons">
                    <button id="true-button" class="btn btn-answer true">True</button>
                    <button id="false-button" class="btn btn-answer false">False</button>
                </div>

                <div id="feedback" class="feedback hidden">
                    <div id="feedback-text"></div>
                    <button id="next-button" class="btn btn-next">Next Question</button>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen">
            <div class="end-content">
                <h1>Time's Up!</h1>
                <div class="final-score">
                    <span>You answered</span>
                    <span id="final-score" class="big-number">0</span>
                    <span>questions correctly</span>
                </div>

                <div class="mode-buttons">
                    <button id="play-again" class="btn btn-primary">Play Again</button>
                    <button id="end-study-button" class="btn btn-secondary">Study Mode</button>
                </div>

                <div class="high-score-box">
                    <span>High Score</span>
                    <span id="end-high-score-display" class="high-score-value">0</span>
                </div>
            </div>
        </div>

    <!-- Menu Confirmation Modal -->
    <div id="menu-confirm-modal" class="modal hidden">
        <div class="modal-content">
            <p class="modal-text">Go back to the main menu?</p>
            <div class="modal-buttons">
                <button id="confirm-go-back" class="btn btn-success">Go Back</button>
                <button id="confirm-stay" class="btn btn-danger">Stay Here</button>
            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
